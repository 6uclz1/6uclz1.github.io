<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portrait</title>
    <script>
      (() => {
        const storedTheme = localStorage.getItem("theme");
        const preference = storedTheme === "light" || storedTheme === "dark" || storedTheme === "system"
          ? storedTheme
          : "system";
        const resolved = preference === "system"
          ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
          : preference;

        document.documentElement.dataset.theme = resolved;
      })();
    </script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f4f1;
        --fg: #0d0d0f;
        --muted: rgba(13, 13, 15, 0.64);
        --line: rgba(13, 13, 15, 0.12);
        --panel: rgba(255, 255, 255, 0.42);
        --bg-rgb: 244 244 241;
        --fg-rgb: 13 13 15;
        --noise-rgb: 10 10 12;
        --fallback-dot: #0d0d0f;
        --content-inline: clamp(1.5rem, 4vw, 3rem);
        --content-max-width: 30rem;
        --link-label-surface: linear-gradient(
          90deg,
          rgba(var(--bg-rgb) / 0.72),
          rgba(var(--bg-rgb) / 0.48)
        );
        --link-hover-shape: linear-gradient(
          112deg,
          rgba(var(--fg-rgb) / 0.78) 0 78%,
          transparent 78% 100%
        );
        --link-hover-duration: 1280ms;
        --link-hover-ease: cubic-bezier(0.22, 1, 0.36, 1);
      }

      :root[data-theme="dark"] {
        color-scheme: dark;
        --bg: #09090b;
        --fg: #f4f4f1;
        --muted: rgba(244, 244, 241, 0.64);
        --line: rgba(244, 244, 241, 0.14);
        --panel: rgba(255, 255, 255, 0.05);
        --bg-rgb: 9 9 11;
        --fg-rgb: 244 244 241;
        --noise-rgb: 246 246 243;
        --fallback-dot: #f4f4f1;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        position: relative;
        overflow-x: hidden;
        background:
          radial-gradient(circle at top left, rgba(127, 127, 127, 0.08), transparent 38%),
          radial-gradient(circle at bottom right, rgba(127, 127, 127, 0.06), transparent 30%),
          var(--bg);
        color: var(--fg);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 16px;
        font-weight: 100;
        transition:
          background-color 240ms ease,
          color 240ms ease;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background-image: radial-gradient(
          circle,
          var(--fallback-dot) 0,
          var(--fallback-dot) 1px,
          transparent 1px
        );
        background-position: 4px 4px;
        background-size: 8px 8px;
      }

      .noise-field {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        display: block;
        pointer-events: none;
      }

      .theme-toggle {
        position: fixed;
        top: 1.5rem;
        right: var(--content-inline);
        z-index: 3;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin: -0.16rem -0.28rem;
        border: 0;
        background: transparent;
        color: var(--muted);
        padding: 0.42rem 0.52rem;
        border-radius: 0;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        font-family: inherit;
        font-size: 0.88rem;
        line-height: 1.35;
        font-weight: 100;
        cursor: pointer;
        box-shadow: none;
        transition: color 240ms ease;
      }

      .page-header {
        position: fixed;
        top: 1.5rem;
        left: var(--content-inline);
        z-index: 3;
        display: flex;
        align-items: center;
        max-width: calc(100vw - var(--content-inline) - var(--content-inline) - 7rem);
        margin: -0.16rem -0.28rem;
        padding: 0.42rem 0.52rem;
        box-shadow: none;
        backdrop-filter: blur(2px);
        -webkit-backdrop-filter: blur(2px);
      }

      .theme-toggle:hover,
      .theme-toggle:focus-visible {
        color: var(--fg);
        text-decoration: underline;
        text-underline-offset: 0.24em;
        outline: none;
      }

      .shell {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: var(--content-inline);
      }

      .portrait {
        font-family: inherit;
        width: min(100%, var(--content-max-width));
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
      }

      .name {
        display: block;
        margin: 0;
        border: 0;
        background: transparent;
        color: var(--muted);
        padding: 0;
        font-family: inherit;
        font-size: 0.88rem;
        line-height: 1.35;
        letter-spacing: 0.14em;
        font-weight: 100;
        max-width: 100%;
        overflow-wrap: anywhere;
      }

      .links {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 2rem;
        width: 100%;
        margin: 0;
        border: 0;
        background: transparent;
      }

      .link-row {
        display: inline-flex;
        align-items: center;
        max-width: 100%;
        padding: 0.12rem 0;
        border: 0;
        border-radius: 0;
        box-sizing: border-box;
        color: var(--muted);
        text-decoration: none;
        font-size: 0.96rem;
        letter-spacing: 0.04em;
        background: transparent;
        transition: color 240ms ease;
      }

      .link-row:hover,
      .link-row:focus-visible {
        color: var(--fg);
        outline: none;
      }

      .link-label {
        display: inline-block;
        max-width: calc(100% + 0.56rem);
        margin: -0.16rem -0.28rem;
        padding: 0.20rem 0.36rem;
        border: 0;
        background-image:
          var(--link-hover-shape),
          var(--link-label-surface);
        background-position:
          -1.2rem 50%,
          50% 50%;
        background-repeat: no-repeat;
        background-size:
          0% 100%,
          100% 100%;
        color: inherit;
        text-align: left;
        line-height: 1.35;
        letter-spacing: 0.14em;
        font-size: 0.88rem;
        font-weight: 100;
        box-shadow: none;
        backdrop-filter: blur(2px);
        -webkit-backdrop-filter: blur(2px);
        overflow-wrap: anywhere;
        transition:
          color var(--link-hover-duration) var(--link-hover-ease),
          background-size var(--link-hover-duration) var(--link-hover-ease),
          background-position var(--link-hover-duration) var(--link-hover-ease);
      }

      .link-row:hover .link-label,
      .link-row:focus-visible .link-label {
        background-position:
          0 50%,
          50% 50%;
        background-size:
          142% 100%,
          100% 100%;
        color: var(--bg);
      }

      .footer-note {
        position: fixed;
        right: calc(var(--content-inline) + 0.28rem);
        bottom: 1.4rem;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        margin: -0.16rem -0.28rem;
        border: 0;
        background: transparent;
        padding: 0.42rem 0.52rem;
        color: var(--muted);
        font-size: 0.78rem;
        line-height: 1.35;
        letter-spacing: 0.08em;
        opacity: 0.58;
        text-align: right;
        box-shadow: none;
        backdrop-filter: blur(2px);
        -webkit-backdrop-filter: blur(2px);
      }

      .test-banner {
        position: fixed;
        left: 50%;
        top: 1.5rem;
        z-index: 4;
        transform: translateX(-50%);
        padding: 0.6rem 0.9rem;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--panel);
        font-size: 0.76rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        backdrop-filter: blur(18px);
      }

      @media (max-width: 720px) {
        .page-header {
          top: 1rem;
        }

        .theme-toggle {
          top: 1rem;
          line-height: 1.15;
        }

        .name {
          line-height: 1.15;
        }

        .portrait {
          padding: 0;
        }

        .link-row {
          padding: 0.1rem 0;
        }

        .footer-note {
          bottom: 1rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .link-label {
          transition: none;
        }
      }

    </style>
  </head>
  <body>
    <canvas class="noise-field" aria-hidden="true"></canvas>
    <header class="page-header">
      <h1 class="name" id="profile-name"></h1>
    </header>
    <button
      class="theme-toggle"
      id="theme-toggle"
      type="button"
      aria-label="Toggle theme"
      aria-pressed="false"
    >
      Theme
    </button>

    <main class="shell">
      <section class="portrait" aria-label="Profile links">
        <div class="links" id="profile-links"></div>
      </section>
    </main>

    <footer class="footer-note">Copyright © 2026 6uclz1.</footer>

    <script>
      const profile = {
        name: "6uclz1's Profile Site",
        links: [
          { service: "github", label: "GitHub", url: "https://github.com/6uclz1/" },
          { service: "x", label: "X (Formally Twitter)", url: "https://x.com/6uclz1/" },
          { service: "hatena-blog", label: "Hatena Blog", url: "http://6uclz1.hatenablog.com/" },
          { service: "note", label: "note", url: "https://note.com/6uclz1/" },
          { service: "sizu-me", label: "Sizu.me", url: "https://sizu.me/6uclz1/" },
          { service: "zenn", label: "Zenn", url: "https://zenn.dev/6uclz1/" },
          { service: "qiita", label: "Qiita", url: "https://qiita.com/6uclz1/" },
          { service: "soundcloud", label: "SoundCloud", url: "https://soundcloud.com/6uclz1/" }
        ]
      };

      const THEME_KEY = "theme";
      const FLOW_FIELD_SCALE = 2;
      const FLOW_NODE_COUNT_RANGE = { min: 3, max: 5 };
      const FLOW_FIELD_SEED = 0x6c6f7a31;
      const FLOW_FIELD_FADE = 0.992;
      const CANVAS_TRAIL_ALPHA = 0.1;
      const VISUAL_GRID_SIZE = 8;
      const INTERACTION_RIPPLE_MAX_COUNT = 8;
      const INTERACTION_RIPPLE_DURATION = 900;
      const INTERACTION_RIPPLE_RADIUS = 18;
      const INTERACTION_RIPPLE_WIDTH = 3;
      const INTERACTION_RIPPLE_STRENGTH = 0.24;
      const CANVAS_QUALITY_PROFILES = Object.freeze({
        high: Object.freeze({ name: "high", gridSize: VISUAL_GRID_SIZE, dprCap: 1.5, fps: 30 }),
        balanced: Object.freeze({ name: "balanced", gridSize: VISUAL_GRID_SIZE, dprCap: 1.25, fps: 24 }),
        low: Object.freeze({ name: "low", gridSize: VISUAL_GRID_SIZE, dprCap: 1, fps: 20 })
      });
      const CANVAS_QUALITY_ORDER = ["high", "balanced", "low"];
      const SLOW_FRAME_LIMIT = 4;
      const SLOW_FRAME_FACTOR = 1.65;
      const ALPHA_BUCKET_COUNT = 8;
      const AMBIENT_DENSITY_MIN = 0.018;
      const AMBIENT_DENSITY_MAX = 0.14;
      const BASE_VORTEX_RADIUS_RANGE = { min: 20, max: 36 };
      const VORTEX_RADIUS_RANGE = {
        min: BASE_VORTEX_RADIUS_RANGE.min * FLOW_FIELD_SCALE,
        max: BASE_VORTEX_RADIUS_RANGE.max * FLOW_FIELD_SCALE
      };
      const BASE_EMITTER_SPREAD_RANGE = { min: 220, max: 380 };
      const EMITTER_SPREAD_RANGE = {
        min: BASE_EMITTER_SPREAD_RANGE.min * FLOW_FIELD_SCALE,
        max: BASE_EMITTER_SPREAD_RANGE.max * FLOW_FIELD_SCALE
      };
      const canvas = document.querySelector(".noise-field");
      const initialCanvasContext = createCanvasContext(canvas);
      const themeToggle = document.getElementById("theme-toggle");
      const systemThemeQuery = window.matchMedia("(prefers-color-scheme: dark)");
      const state = {
        width: 0,
        height: 0,
        dpr: 1,
        dprCap: CANVAS_QUALITY_PROFILES.high.dprCap,
        rafId: 0,
        resizeRafId: 0,
        running: false,
        lastFrame: 0,
        frameInterval: 1000 / CANVAS_QUALITY_PROFILES.high.fps,
        slowFrameCount: 0,
        initialized: false,
        themePreference: "system",
        resolvedTheme: "light",
        canvas,
        ctx: initialCanvasContext,
        qualityProfileName: CANVAS_QUALITY_PROFILES.high.name,
        qualityProfile: CANVAS_QUALITY_PROFILES.high,
        fieldColumns: 0,
        fieldRows: 0,
        densityField: new Float32Array(0),
        nextDensityField: new Float32Array(0),
        flowFieldConfig: null,
        frameNodes: {
          vortices: [],
          emitters: []
        },
        interactionRipples: [],
        rowDriftX: new Float32Array(0),
        columnDriftY: new Float32Array(0),
        dotPositionsX: new Uint16Array(0),
        dotPositionsY: new Uint16Array(0),
        palette: {
          bg: "244 244 241",
          fg: "13 13 15",
          noise: "10 10 12"
        },
        paletteRgb: {
          bg: [244, 244, 241],
          fg: [13, 13, 15],
          noise: [10, 10, 12]
        },
        gridSize: 8
      };

      function lerp(start, end, amount) {
        return start + amount * (end - start);
      }

      function randomBetween(min, max, randomValue = Math.random) {
        return lerp(min, max, randomValue());
      }

      function randomIntBetween(min, max, randomValue = Math.random) {
        return Math.floor(randomBetween(min, max + 1, randomValue));
      }

      function createSeededRandom(seed) {
        let value = Number.isFinite(seed) ? seed >>> 0 : 0;

        return () => {
          value = (value + 0x6d2b79f5) >>> 0;
          let mixed = value;
          mixed = Math.imul(mixed ^ (mixed >>> 15), mixed | 1);
          mixed ^= mixed + Math.imul(mixed ^ (mixed >>> 7), mixed | 61);
          return ((mixed ^ (mixed >>> 14)) >>> 0) / 4294967296;
        };
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function parseRgbTriplet(value) {
        return value
          .trim()
          .split(/\s+/)
          .slice(0, 3)
          .map((channel) => Number(channel));
      }

      function formatCanvasRgb(rgb) {
        const [red, green, blue] = rgb.map((channel) => Math.round(clamp(channel, 0, 255)));
        return `rgb(${red}, ${green}, ${blue})`;
      }

      function formatCanvasRgba(rgb, alpha) {
        const [red, green, blue] = rgb.map((channel) => Math.round(clamp(channel, 0, 255)));
        return `rgba(${red}, ${green}, ${blue}, ${clamp(alpha, 0, 1)})`;
      }

      function createCanvasContext(canvasElement) {
        if (!canvasElement || typeof canvasElement.getContext !== "function") {
          return null;
        }

        try {
          const opaqueContext = canvasElement.getContext("2d", {
            alpha: false
          });
          if (opaqueContext) {
            return opaqueContext;
          }
        } catch (error) {
          // Fall back below for browsers that reject context attributes.
        }

        try {
          return canvasElement.getContext("2d");
        } catch (error) {
          return null;
        }
      }

      function selectQualityProfile(environment = navigator) {
        const connection = environment?.connection || environment?.mozConnection || environment?.webkitConnection;
        if (connection?.saveData === true) {
          return CANVAS_QUALITY_PROFILES.low;
        }

        return CANVAS_QUALITY_PROFILES.high;
      }

      function applyQualityProfile(profile) {
        const nextProfile = typeof profile === "string" ? CANVAS_QUALITY_PROFILES[profile] : profile;
        if (!nextProfile) {
          return state.qualityProfile;
        }

        state.qualityProfile = nextProfile;
        state.qualityProfileName = nextProfile.name;
        state.gridSize = nextProfile.gridSize;
        state.dprCap = nextProfile.dprCap;
        state.frameInterval = 1000 / nextProfile.fps;
        state.slowFrameCount = 0;
        return nextProfile;
      }

      function degradeQualityProfile() {
        const currentIndex = CANVAS_QUALITY_ORDER.indexOf(state.qualityProfileName);
        if (currentIndex < 0 || currentIndex >= CANVAS_QUALITY_ORDER.length - 1) {
          return false;
        }

        applyQualityProfile(CANVAS_QUALITY_ORDER[currentIndex + 1]);
        resizeCanvas({ force: true });
        return true;
      }

      function recordFramePerformance(duration) {
        if (!Number.isFinite(duration) || duration <= state.frameInterval * SLOW_FRAME_FACTOR) {
          state.slowFrameCount = 0;
          return false;
        }

        state.slowFrameCount += 1;
        if (state.slowFrameCount < SLOW_FRAME_LIMIT) {
          return false;
        }

        return degradeQualityProfile();
      }

      function shouldRenderFrame(time) {
        return state.lastFrame === 0 || time - state.lastFrame >= state.frameInterval;
      }

      function createFlowNodes(count, buildNode) {
        const nodes = [];

        for (let index = 0; index < count; index += 1) {
          nodes.push(buildNode(index, count));
        }

        return nodes;
      }

      function createFlowFieldConfig(randomValue = Math.random) {
        const vortexCount = randomIntBetween(FLOW_NODE_COUNT_RANGE.min, FLOW_NODE_COUNT_RANGE.max, randomValue);
        const emitterCount = randomIntBetween(FLOW_NODE_COUNT_RANGE.min, FLOW_NODE_COUNT_RANGE.max, randomValue);

        return {
          vortices: createFlowNodes(vortexCount, (index, count) => {
            const anchorX = clamp(
              lerp(0.22, 0.78, (index + 1) / (count + 1)) + randomBetween(-0.08, 0.08, randomValue),
              0.14,
              0.86
            );

            return {
              anchorX,
              anchorY: randomBetween(0.24, 0.76, randomValue),
              orbitAmplitudeX: randomBetween(0.04, 0.12, randomValue),
              orbitAmplitudeY: randomBetween(0.05, 0.14, randomValue),
              orbitSpeedX: randomBetween(0.7, 1.35, randomValue),
              orbitSpeedY: randomBetween(0.7, 1.35, randomValue),
              phaseX: randomBetween(0, Math.PI * 2, randomValue),
              phaseY: randomBetween(0, Math.PI * 2, randomValue),
              radius: randomBetween(VORTEX_RADIUS_RANGE.min, VORTEX_RADIUS_RANGE.max, randomValue),
              strength: (index % 2 === 0 ? 1 : -1) * randomBetween(2.1, 3.1, randomValue)
            };
          }),
          emitters: createFlowNodes(emitterCount, (index, count) => {
            const anchorX = clamp(
              lerp(0.2, 0.8, (index + 1) / (count + 1)) + randomBetween(-0.1, 0.1, randomValue),
              0.12,
              0.88
            );

            return {
              anchorX,
              anchorY: randomBetween(0.28, 0.72, randomValue),
              orbitAmplitudeX: randomBetween(0.05, 0.14, randomValue),
              orbitAmplitudeY: randomBetween(0.05, 0.15, randomValue),
              orbitSpeedX: randomBetween(0.75, 1.3, randomValue),
              orbitSpeedY: randomBetween(0.75, 1.3, randomValue),
              phaseX: randomBetween(0, Math.PI * 2, randomValue),
              phaseY: randomBetween(0, Math.PI * 2, randomValue),
              spread: randomBetween(EMITTER_SPREAD_RANGE.min, EMITTER_SPREAD_RANGE.max, randomValue),
              intensity: randomBetween(0.055, 0.09, randomValue)
            };
          })
        };
      }

      function createStableFlowFieldConfig(seed = FLOW_FIELD_SEED) {
        return createFlowFieldConfig(createSeededRandom(seed));
      }

      function smoothstep(edge0, edge1, value) {
        const normalized = clamp((value - edge0) / (edge1 - edge0), 0, 1);
        return normalized * normalized * (3 - 2 * normalized);
      }

      function fieldIndex(x, y) {
        return y * state.fieldColumns + x;
      }

      function sampleDensityField(field, columns, rows, x, y) {
        if (!field || columns <= 0 || rows <= 0 || field.length < columns * rows) {
          return 0;
        }

        const maxX = columns - 1;
        const maxY = rows - 1;
        const sampleX = x < 0 ? 0 : x > maxX ? maxX : x;
        const sampleY = y < 0 ? 0 : y > maxY ? maxY : y;
        const x0 = Math.floor(sampleX);
        const y0 = Math.floor(sampleY);
        const x1 = Math.min(x0 + 1, maxX);
        const y1 = Math.min(y0 + 1, maxY);
        const tx = sampleX - x0;
        const ty = sampleY - y0;
        const rowOffset0 = y0 * columns;
        const rowOffset1 = y1 * columns;
        const top = lerp(field[rowOffset0 + x0], field[rowOffset0 + x1], tx);
        const bottom = lerp(field[rowOffset1 + x0], field[rowOffset1 + x1], tx);
        return lerp(top, bottom, ty);
      }

      function resizeDensityField(previousField, previousColumns, previousRows, nextColumns, nextRows) {
        const nextSize = nextColumns * nextRows;
        const nextField = new Float32Array(nextSize);
        if (
          !previousField ||
          previousColumns <= 0 ||
          previousRows <= 0 ||
          nextColumns <= 0 ||
          nextRows <= 0 ||
          previousField.length < previousColumns * previousRows
        ) {
          return nextField;
        }

        const scaleX = nextColumns > 1 ? (previousColumns - 1) / (nextColumns - 1) : 0;
        const scaleY = nextRows > 1 ? (previousRows - 1) / (nextRows - 1) : 0;

        for (let row = 0; row < nextRows; row += 1) {
          for (let column = 0; column < nextColumns; column += 1) {
            nextField[row * nextColumns + column] = sampleDensityField(
              previousField,
              previousColumns,
              previousRows,
              column * scaleX,
              row * scaleY
            );
          }
        }

        return nextField;
      }

      function resolveOrbitPosition(node, orbit, width, height) {
        return {
          x: width * (node.anchorX + Math.cos(orbit * node.orbitSpeedX + node.phaseX) * node.orbitAmplitudeX),
          y: height * (node.anchorY + Math.sin(orbit * node.orbitSpeedY + node.phaseY) * node.orbitAmplitudeY)
        };
      }

      function resolveFrameNodes(time) {
        const vortexOrbit = time * 0.00022;
        const emitterOrbit = time * 0.00028;

        return {
          vortices: state.flowFieldConfig.vortices.map((vortex) => {
            const center = resolveOrbitPosition(vortex, vortexOrbit, state.fieldColumns, state.fieldRows);
            const radiusSquared = vortex.radius * vortex.radius;
            return {
              x: center.x,
              y: center.y,
              radiusSquared,
              inverseRadiusSquared: 1 / radiusSquared,
              cutoffDistanceSquared: radiusSquared * 9,
              strength: vortex.strength
            };
          }),
          emitters: state.flowFieldConfig.emitters.map((emitter) => {
            const center = resolveOrbitPosition(emitter, emitterOrbit, state.fieldColumns, state.fieldRows);
            const inverseSpread = 1 / emitter.spread;
            return {
              x: center.x,
              y: center.y,
              inverseSpread,
              cutoffDistanceSquared: 9 / inverseSpread,
              intensity: emitter.intensity
            };
          })
        };
      }

      function pruneExpiredInteractionRipples(time) {
        if (!Array.isArray(state.interactionRipples) || state.interactionRipples.length === 0) {
          return [];
        }

        const activeRipples = state.interactionRipples.filter((ripple) => {
          const age = time - ripple.startTime;
          return Number.isFinite(age) && age >= 0 && age <= INTERACTION_RIPPLE_DURATION;
        });

        if (activeRipples.length !== state.interactionRipples.length) {
          state.interactionRipples = activeRipples;
        }

        return state.interactionRipples;
      }

      function queueInteractionRipple(clientX, clientY, time = performance.now()) {
        if (
          state.fieldColumns <= 0 ||
          state.fieldRows <= 0 ||
          state.gridSize <= 0 ||
          !Number.isFinite(clientX) ||
          !Number.isFinite(clientY)
        ) {
          return false;
        }

        const ripple = {
          x: clamp(clientX / state.gridSize, 0, state.fieldColumns - 1),
          y: clamp(clientY / state.gridSize, 0, state.fieldRows - 1),
          startTime: Number.isFinite(time) ? time : performance.now()
        };

        state.interactionRipples.push(ripple);
        if (state.interactionRipples.length > INTERACTION_RIPPLE_MAX_COUNT) {
          state.interactionRipples.splice(0, state.interactionRipples.length - INTERACTION_RIPPLE_MAX_COUNT);
        }

        return true;
      }

      function interactionDensityAt(x, y, time, ripples) {
        if (!Array.isArray(ripples) || ripples.length === 0) {
          return 0;
        }

        let density = 0;
        for (const ripple of ripples) {
          const age = time - ripple.startTime;
          if (!Number.isFinite(age) || age < 0 || age > INTERACTION_RIPPLE_DURATION) {
            continue;
          }

          const progress = age / INTERACTION_RIPPLE_DURATION;
          const waveRadius = progress * INTERACTION_RIPPLE_RADIUS;
          const dx = x - ripple.x;
          const dy = y - ripple.y;
          const distance = Math.hypot(dx, dy);
          const crest = 1 - smoothstep(0, INTERACTION_RIPPLE_WIDTH, Math.abs(distance - waveRadius));
          const fadeOut = 1 - smoothstep(0.72, 1, progress);
          density = Math.max(density, crest * fadeOut * INTERACTION_RIPPLE_STRENGTH);
        }

        return density;
      }

      function seedAmbientDensityField() {
        const size = state.fieldColumns * state.fieldRows;
        state.densityField = new Float32Array(size);
        state.nextDensityField = new Float32Array(size);

        for (let y = 0; y < state.fieldRows; y += 1) {
          for (let x = 0; x < state.fieldColumns; x += 1) {
            const rawNoise = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
            const noise = rawNoise - Math.floor(rawNoise);
            const sparseDot = smoothstep(0.82, 1, noise);
            const softVariation = (Math.sin(x * 0.37) + Math.cos(y * 0.41)) * 0.004;
            const density =
              AMBIENT_DENSITY_MIN +
              softVariation +
              sparseDot * (AMBIENT_DENSITY_MAX - AMBIENT_DENSITY_MIN);
            state.densityField[fieldIndex(x, y)] = clamp(density, 0, AMBIENT_DENSITY_MAX);
          }
        }
      }

      function initializeGridGeometry() {
        state.dotPositionsX = new Uint16Array(state.fieldColumns * state.fieldRows);
        state.dotPositionsY = new Uint16Array(state.fieldColumns * state.fieldRows);
        state.rowDriftX = new Float32Array(state.fieldRows);
        state.columnDriftY = new Float32Array(state.fieldColumns);

        const cell = state.gridSize;
        const offset = cell * 0.5;

        for (let row = 0; row < state.fieldRows; row += 1) {
          for (let col = 0; col < state.fieldColumns; col += 1) {
            const index = fieldIndex(col, row);
            state.dotPositionsX[index] = Math.round(col * cell + offset);
            state.dotPositionsY[index] = Math.round(row * cell + offset);
          }
        }
      }

      function populateDriftTables(time) {
        for (let row = 0; row < state.fieldRows; row += 1) {
          state.rowDriftX[row] = Math.sin(time * 0.00018 + row * 0.08) * 0.35;
        }

        for (let column = 0; column < state.fieldColumns; column += 1) {
          state.columnDriftY[column] = Math.cos(time * 0.00016 + column * 0.07) * 0.3;
        }
      }

      function stepFluidField(time, dt, frameNodes) {
        const scaledDt = Math.min(dt, 0.033) * 60;
        const columns = state.fieldColumns;
        const rows = state.fieldRows;
        const currentField = state.densityField;
        const nextField = state.nextDensityField;
        const vortices = frameNodes.vortices;
        const emitters = frameNodes.emitters;
        const interactionRipples = pruneExpiredInteractionRipples(time);
        const maxX = columns - 1;
        const maxY = rows - 1;

        populateDriftTables(time);

        for (let y = 0; y < rows; y += 1) {
          const rowOffset = y * columns;
          const upOffset = (y === 0 ? 0 : y - 1) * columns;
          const downOffset = (y === rows - 1 ? rows - 1 : y + 1) * columns;
          const baseVx = state.rowDriftX[y];

          for (let x = 0; x < columns; x += 1) {
            const idx = rowOffset + x;
            const leftIndex = rowOffset + (x === 0 ? 0 : x - 1);
            const rightIndex = rowOffset + (x === columns - 1 ? columns - 1 : x + 1);
            const upIndex = upOffset + x;
            const downIndex = downOffset + x;
            let totalVx = baseVx;
            let totalVy = state.columnDriftY[x];

            for (let vortexIndex = 0; vortexIndex < vortices.length; vortexIndex += 1) {
              const vortex = vortices[vortexIndex];
              const dx = x - vortex.x;
              const dy = y - vortex.y;
              const distanceSquared = dx * dx + dy * dy + 0.0001;
              if (distanceSquared > vortex.cutoffDistanceSquared) {
                continue;
              }

              const influence = vortex.strength * Math.exp(-(distanceSquared * vortex.inverseRadiusSquared)) / Math.sqrt(distanceSquared);
              totalVx += -dy * influence;
              totalVy += dx * influence;
            }

            const sourceX = x - totalVx * scaledDt;
            const sourceY = y - totalVy * scaledDt;
            const sampleX = sourceX < 0 ? 0 : sourceX > maxX ? maxX : sourceX;
            const sampleY = sourceY < 0 ? 0 : sourceY > maxY ? maxY : sourceY;
            const x0 = Math.floor(sampleX);
            const y0 = Math.floor(sampleY);
            const x1 = x0 === maxX ? maxX : x0 + 1;
            const y1 = y0 === maxY ? maxY : y0 + 1;
            const tx = sampleX - x0;
            const ty = sampleY - y0;
            const sampleRowOffset0 = y0 * columns;
            const sampleRowOffset1 = y1 * columns;
            const top = lerp(currentField[sampleRowOffset0 + x0], currentField[sampleRowOffset0 + x1], tx);
            const bottom = lerp(currentField[sampleRowOffset1 + x0], currentField[sampleRowOffset1 + x1], tx);
            const advected = lerp(top, bottom, ty);
            const left = currentField[leftIndex];
            const right = currentField[rightIndex];
            const up = currentField[upIndex];
            const down = currentField[downIndex];
            const neighborhood = (left + right + up + down) * 0.25;
            let injected = 0;

            for (let emitterIndex = 0; emitterIndex < emitters.length; emitterIndex += 1) {
              const emitter = emitters[emitterIndex];
              const dx = x - emitter.x;
              const dy = y - emitter.y;
              const distanceSquared = dx * dx + dy * dy;
              if (distanceSquared > emitter.cutoffDistanceSquared) {
                continue;
              }

              const density = Math.exp(-(distanceSquared * emitter.inverseSpread)) * emitter.intensity;
              if (density > injected) {
                injected = density;
              }
            }

            const interactionDensity = interactionDensityAt(x, y, time, interactionRipples);
            if (interactionDensity > injected) {
              injected = interactionDensity;
            }

            const blended = advected * 0.82 + neighborhood * 0.14 + injected;
            nextField[idx] = clamp(blended * FLOW_FIELD_FADE, 0, 1);
          }
        }

        state.densityField = nextField;
        state.nextDensityField = currentField;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function buildLinkMarkup(links) {
        return links
          .filter((link) => link.url.trim() !== "")
          .map((link) => {
            const label = escapeHtml(link.label);
            const url = escapeHtml(link.url);

            return [
              '<a class="link-row" href="',
              url,
              '" target="_blank" rel="noreferrer noopener">',
              '<span class="link-label">',
              label,
              "</span>",
              "</a>"
            ].join("");
          })
          .join("");
      }

      function renderProfile() {
        document.getElementById("profile-name").textContent = profile.name;
        document.getElementById("profile-links").innerHTML = buildLinkMarkup(profile.links);
      }

      function getSystemTheme() {
        return systemThemeQuery.matches ? "dark" : "light";
      }

      function resolveTheme(preference) {
        return preference === "system" ? getSystemTheme() : preference;
      }

      function readThemePreference() {
        const stored = localStorage.getItem(THEME_KEY);
        if (stored === "light" || stored === "dark" || stored === "system") {
          return stored;
        }

        return "system";
      }

      function syncPalette() {
        const styles = getComputedStyle(document.documentElement);
        state.palette = {
          bg: styles.getPropertyValue("--bg-rgb").trim(),
          fg: styles.getPropertyValue("--fg-rgb").trim(),
          noise: styles.getPropertyValue("--noise-rgb").trim()
        };
        state.paletteRgb = {
          bg: parseRgbTriplet(state.palette.bg),
          fg: parseRgbTriplet(state.palette.fg),
          noise: parseRgbTriplet(state.palette.noise)
        };
      }

      function drawStaticBackdrop() {
        const context = state.ctx;
        if (!context) {
          return false;
        }

        context.clearRect(0, 0, state.width, state.height);
        context.fillStyle = formatCanvasRgb(state.paletteRgb.bg);
        context.fillRect(0, 0, state.width, state.height);
        drawGridBackdrop();
        return true;
      }

      function applyTheme(preference) {
        state.themePreference = preference;
        state.resolvedTheme = resolveTheme(preference);
        document.documentElement.dataset.theme = state.resolvedTheme;
        themeToggle.setAttribute("aria-pressed", String(state.resolvedTheme === "dark"));
        themeToggle.textContent = state.resolvedTheme === "dark" ? "Light" : "Dark";
        syncPalette();

        if (state.initialized && !state.running) {
          drawStaticBackdrop();
        }
      }

      function initializeTheme(preference = readThemePreference()) {
        applyTheme(preference);
        return {
          preference,
          resolved: state.resolvedTheme
        };
      }

      function toggleTheme() {
        const nextTheme = state.resolvedTheme === "dark" ? "light" : "dark";
        localStorage.setItem(THEME_KEY, nextTheme);
        applyTheme(nextTheme);
      }

      function drawGridBackdrop() {
        const context = state.ctx;
        if (!context) {
          return 0;
        }

        const maxAlpha = state.resolvedTheme === "dark" ? 0.46 : 0.34;
        let currentBucket = 0;
        let drawnDots = 0;
        context.fillStyle = formatCanvasRgb(state.paletteRgb.fg);
        for (let index = 0; index < state.densityField.length; index += 1) {
          const fillAlpha = smoothstep(0.08, 0.92, state.densityField[index]) * maxAlpha;
          if (fillAlpha <= 0.004) {
            continue;
          }

          const alphaBucket = Math.ceil((fillAlpha / maxAlpha) * ALPHA_BUCKET_COUNT);
          if (alphaBucket !== currentBucket) {
            context.globalAlpha = (alphaBucket / ALPHA_BUCKET_COUNT) * maxAlpha;
            currentBucket = alphaBucket;
          }

          context.fillRect(state.dotPositionsX[index], state.dotPositionsY[index], 1, 1);
          drawnDots += 1;
        }
        context.globalAlpha = 1;
        return drawnDots;
      }

      function resolveCanvasDpr(rawDpr, cap) {
        const nextRawDpr = Number.isFinite(rawDpr) && rawDpr > 0 ? rawDpr : 1;
        const nextCap = Number.isFinite(cap) && cap > 0 ? cap : 1;
        const bucket = nextRawDpr >= 2 && nextCap >= 2 ? 2 : 1;
        return Math.min(bucket, Math.floor(nextCap));
      }

      function resizeCanvas(options = {}) {
        const targetCanvas = state.canvas;
        const context = state.ctx;
        if (!targetCanvas || !context) {
          return false;
        }

        const force = options.force === true;
        const nextWidth = window.innerWidth;
        const nextHeight = window.innerHeight;
        const nextDpr = resolveCanvasDpr(window.devicePixelRatio || 1, state.dprCap);
        const previousColumns = state.fieldColumns;
        const previousRows = state.fieldRows;
        const previousDensityField = state.densityField;
        if (
          !force &&
          state.width === nextWidth &&
          state.height === nextHeight &&
          state.dpr === nextDpr &&
          state.densityField.length > 0
        ) {
          return false;
        }

        state.dpr = nextDpr;
        state.width = nextWidth;
        state.height = nextHeight;
        targetCanvas.width = Math.round(state.width * state.dpr);
        targetCanvas.height = Math.round(state.height * state.dpr);
        targetCanvas.style.width = state.width + "px";
        targetCanvas.style.height = state.height + "px";
        context.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
        context.imageSmoothingEnabled = false;
        context.clearRect(0, 0, state.width, state.height);
        state.fieldColumns = Math.ceil(state.width / state.gridSize) + 1;
        state.fieldRows = Math.ceil(state.height / state.gridSize) + 1;
        if (!state.flowFieldConfig) {
          state.flowFieldConfig = createStableFlowFieldConfig();
        }
        state.frameNodes = resolveFrameNodes(state.lastFrame || 0);
        initializeGridGeometry();

        if (
          previousColumns > 0 &&
          previousRows > 0 &&
          previousDensityField &&
          previousDensityField.length >= previousColumns * previousRows
        ) {
          state.densityField = resizeDensityField(
            previousDensityField,
            previousColumns,
            previousRows,
            state.fieldColumns,
            state.fieldRows
          );
          state.nextDensityField = new Float32Array(state.densityField.length);
        } else {
          seedAmbientDensityField();
        }

        drawStaticBackdrop();
        return true;
      }

      function scheduleCanvasResize() {
        if (!state.canvas || !state.ctx || state.resizeRafId !== 0) {
          return false;
        }

        state.resizeRafId = window.requestAnimationFrame(() => {
          state.resizeRafId = 0;
          resizeCanvas();
        });
        return true;
      }

      function paintFrame(time) {
        const context = state.ctx;
        if (!context) {
          return false;
        }

        if (!shouldRenderFrame(time)) {
          if (state.running) {
            state.rafId = window.requestAnimationFrame(paintFrame);
          }
          return false;
        }

        const performanceStart = typeof performance !== "undefined" ? performance.now() : time;
        const dt = state.lastFrame === 0 ? 0.016 : Math.min((time - state.lastFrame) / 1000, 0.033);
        state.lastFrame = time;
        state.frameNodes = resolveFrameNodes(time);
        stepFluidField(time, dt, state.frameNodes);

        context.fillStyle = formatCanvasRgba(state.paletteRgb.bg, CANVAS_TRAIL_ALPHA);
        context.fillRect(0, 0, state.width, state.height);
        drawGridBackdrop();
        recordFramePerformance((typeof performance !== "undefined" ? performance.now() : time) - performanceStart);

        if (state.running) {
          state.rafId = window.requestAnimationFrame(paintFrame);
        }
        return true;
      }

      function startAnimation() {
        if (!state.ctx) {
          return false;
        }


        if (state.running) {
          drawStaticBackdrop();
          return true;
        }

        state.running = true;
        state.lastFrame = 0;
        state.rafId = window.requestAnimationFrame(paintFrame);
        return true;
      }

      function stopAnimation() {
        state.running = false;
        window.cancelAnimationFrame(state.rafId);
        state.rafId = 0;
      }

      function handleVisibilityChange() {
        if (document.hidden) {
          stopAnimation();
          return;
        }

        startAnimation();
      }

      function handleDotInteraction(event) {
        if (!event) {
          return false;
        }

        return queueInteractionRipple(event.clientX, event.clientY);
      }

                config.vortices.every((vortex) =>
                  vortex.radius >= VORTEX_RADIUS_RANGE.min &&
                  vortex.radius <= VORTEX_RADIUS_RANGE.max &&
                  Number.isFinite(vortex.strength)
                ) &&
                config.emitters.every((emitter) =>
                  emitter.spread >= EMITTER_SPREAD_RANGE.min &&
                  emitter.spread <= EMITTER_SPREAD_RANGE.max &&
                  emitter.intensity >= 0.055 &&
                  emitter.intensity <= 0.09
                )
              );
            }
          },
          {
            name: "resizeDensityField preserves normalized samples",
            test() {
              if (typeof resizeDensityField !== "function") {
                return false;
              }

              const resized = resizeDensityField(new Float32Array([0, 1, 1, 0]), 2, 2, 3, 3);
              return (
                resized.length === 9 &&
                resized[0] === 0 &&
                resized[2] === 1 &&
                resized[6] === 1 &&
                resized[8] === 0 &&
                Math.abs(resized[4] - 0.5) < 0.00001
              );
            }
          },
          {
            name: "resizeCanvas resamples existing density instead of reseeding",
            test() {
              const previousWidthDescriptor = Object.getOwnPropertyDescriptor(window, "innerWidth");
              const previousHeightDescriptor = Object.getOwnPropertyDescriptor(window, "innerHeight");
              const fakeContext = {
                clearRect() {},
                fillRect() {},
                setTransform() {},
                imageSmoothingEnabled: true,
                fillStyle: "",
                globalAlpha: 1
              };
              const fakeCanvas = {
                width: 0,
                height: 0,
                style: {}
              };

              try {
                Object.defineProperty(window, "innerWidth", { configurable: true, value: 16 });
                Object.defineProperty(window, "innerHeight", { configurable: true, value: 16 });

                return withTemporaryState(
                  {
                    canvas: fakeCanvas,
                    ctx: fakeContext,
                    running: false,
                    width: 8,
                    height: 8,
                    dpr: 1,
                    dprCap: 1,
                    gridSize: 8,
                    fieldColumns: 2,
                    fieldRows: 2,
                    densityField: new Float32Array([0, 1, 1, 0]),
                    nextDensityField: new Float32Array(4),
                    flowFieldConfig: createStableFlowFieldConfig(),
                    frameNodes: { vortices: [], emitters: [] },
                    dotPositionsX: new Uint16Array(0),
                    dotPositionsY: new Uint16Array(0),
                    rowDriftX: new Float32Array(0),
                    columnDriftY: new Float32Array(0)
                  },
                  () => {
                    const resized = resizeCanvas();
                    return (
                      resized === true &&
                      state.densityField.length === 9 &&
                      Math.abs(state.densityField[4] - 0.5) < 0.00001 &&
                      state.densityField.some((value) => value > 0.9) &&
                      state.densityField.some((value) => value < 0.1)
                    );
                  }
                );
              } finally {
                if (previousWidthDescriptor) {
                  Object.defineProperty(window, "innerWidth", previousWidthDescriptor);
                } else {
                  delete window.innerWidth;
                }
                if (previousHeightDescriptor) {
                  Object.defineProperty(window, "innerHeight", previousHeightDescriptor);
                } else {
                  delete window.innerHeight;
                }
              }
            }
          },
          {
            name: "seedAmbientDensityField starts with dark dots",
            test() {
              if (typeof seedAmbientDensityField !== "function") {
                return false;
              }

              return withTemporaryState(
                {
                  fieldColumns: 10,
                  fieldRows: 8,
                  densityField: new Float32Array(0),
                  nextDensityField: new Float32Array(0)
                },
                () => {
                  seedAmbientDensityField();
                  const values = Array.from(state.densityField);
                  const maxDensity = Math.max(...values);
                  const averageDensity = values.reduce((sum, value) => sum + value, 0) / values.length;
                  return (
                    state.densityField.length === 80 &&
                    state.nextDensityField.length === 80 &&
                    maxDensity <= 0.145 &&
                    averageDensity <= 0.06
                  );
                }
              );
            }
          },
          {
            name: "buildLinkMarkup omits empty urls",
            test() {
              const markup = buildLinkMarkup([
                { service: "github", label: "One", url: "https://example.com" },
                { service: "x", label: "Skip", url: "" }
              ]);
              return markup.includes("example.com") && !markup.includes("Skip");
            }
          },
          {
            name: "buildLinkMarkup renders text-only link rows",
            test() {
              const markup = buildLinkMarkup([
                { service: "github", label: "One", url: "https://example.com" }
              ]);
              const rowIndex = markup.indexOf('class="link-row"');
              const chipIndex = markup.indexOf('class="link-chip"');
              const iconIndex = markup.indexOf('class="link-icon"');
              const svgIndex = markup.indexOf("<svg");
              const labelIndex = markup.indexOf('class="link-label"');
              return (
                rowIndex !== -1 &&
                chipIndex === -1 &&
                iconIndex === -1 &&
                svgIndex === -1 &&
                labelIndex !== -1 &&
                rowIndex < labelIndex
              );
            }
          },
          {
            name: "initializeTheme resolves system, light, dark",
            test() {
              const system = initializeTheme("system");
              const light = initializeTheme("light");
              const dark = initializeTheme("dark");

              return (
                (system.resolved === "light" || system.resolved === "dark") &&
                light.resolved === "light" &&
                dark.resolved === "dark"
              );
            }
          },
          {
            name: "resolveFrameNodes caches finite positions and properties",
            test() {
              return withTemporaryState(
                {
                  fieldColumns: 24,
                  fieldRows: 16,
                  flowFieldConfig: createFlowFieldConfig(() => 0.42)
                },
                () => {
                  const frameNodes = resolveFrameNodes(1200);
                  return (
                    frameNodes.vortices.every((vortex) =>
                      Number.isFinite(vortex.x) &&
                      Number.isFinite(vortex.y) &&
                      Number.isFinite(vortex.radiusSquared) &&
                      Number.isFinite(vortex.strength)
                    ) &&
                    frameNodes.emitters.every((emitter) =>
                      Number.isFinite(emitter.x) &&
                      Number.isFinite(emitter.y) &&
                      Number.isFinite(emitter.inverseSpread) &&
                      Number.isFinite(emitter.intensity)
                    )
                  );
                }
              );
            }
          },
          {
            name: "stepFluidField keeps density field finite",
            test() {
              return withTemporaryState(
                {
                  fieldColumns: 12,
                  fieldRows: 8,
                  flowFieldConfig: createFlowFieldConfig(() => 0.28),
                  densityField: new Float32Array(96).fill(0.2),
                  nextDensityField: new Float32Array(96),
                  rowDriftX: new Float32Array(8),
                  columnDriftY: new Float32Array(12)
                },
                () => {
                  const frameNodes = resolveFrameNodes(900);
                  stepFluidField(900, 0.016, frameNodes);
                  return Array.from(state.densityField).every((value) => Number.isFinite(value));
                }
              );
            }
          },
          {
            name: "queueInteractionRipple converts viewport taps to grid coordinates",
            test() {
              if (typeof queueInteractionRipple !== "function") {
                return false;
              }

              return withTemporaryState(
                {
                  width: 80,
                  height: 80,
                  gridSize: 8,
                  fieldColumns: 11,
                  fieldRows: 11,
                  interactionRipples: []
                },
                () => {
                  const queued = queueInteractionRipple(40, 24, 1200);
                  const ripple = state.interactionRipples[0];
                  return (
                    queued === true &&
                    state.interactionRipples.length === 1 &&
                    ripple.x === 5 &&
                    ripple.y === 3 &&
                    ripple.startTime === 1200
                  );
                }
              );
            }
          },
          {
            name: "interactionDensityAt forms a temporary ripple crest",
            test() {
              if (
                typeof interactionDensityAt !== "function" ||
                typeof INTERACTION_RIPPLE_DURATION !== "number" ||
                typeof INTERACTION_RIPPLE_RADIUS !== "number"
              ) {
                return false;
              }

              const ripple = { x: 5, y: 5, startTime: 1000 };
              const crestTime = 1000 + INTERACTION_RIPPLE_DURATION * 0.25;
              const crestX = 5 + INTERACTION_RIPPLE_RADIUS * 0.25;
              const crestDensity = interactionDensityAt(crestX, 5, crestTime, [ripple]);
              const expiredDensity = interactionDensityAt(crestX, 5, 1000 + INTERACTION_RIPPLE_DURATION + 1, [ripple]);
              return crestDensity > 0.04 && expiredDensity === 0;
            }
          },
          {
            name: "stepFluidField injects density from active interaction ripples",
            test() {
              return withTemporaryState(
                {
                  fieldColumns: 12,
                  fieldRows: 8,
                  densityField: new Float32Array(96),
                  nextDensityField: new Float32Array(96),
                  rowDriftX: new Float32Array(8),
                  columnDriftY: new Float32Array(12),
                  interactionRipples: [{ x: 6, y: 4, startTime: 1000 }]
                },
                () => {
                  stepFluidField(1000, 0.016, { vortices: [], emitters: [] });
                  const values = Array.from(state.densityField);
                  return (
                    values.every((value) => Number.isFinite(value)) &&
                    Math.max(...values) > 0
                  );
                }
              );
            }
          },
          {
            name: "handleDotInteraction queues ripples without preventing default",
            test() {
              if (typeof handleDotInteraction !== "function") {
                return false;
              }

              let defaultPrevented = false;
              return withTemporaryState(
                {
                  width: 80,
                  height: 80,
                  gridSize: 8,
                  fieldColumns: 11,
                  fieldRows: 11,
                  interactionRipples: []
                },
                () => {
                  handleDotInteraction({
                    clientX: 32,
                    clientY: 40,
                    preventDefault() {
                      defaultPrevented = true;
                    }
                  });
                  return defaultPrevented === false && state.interactionRipples.length === 1;
                }
              );
            }
          },
          {
            name: "initializeGridGeometry caches dot coordinates",
            test() {
              return withTemporaryState(
                {
                  width: 24,
                  height: 16,
                  fieldColumns: 3,
                  fieldRows: 2,
                  gridSize: 8,
                  dotPositionsX: new Uint16Array(0),
                  dotPositionsY: new Uint16Array(0),
                  rowDriftX: new Float32Array(0),
                  columnDriftY: new Float32Array(0)
                },
                () => {
                  initializeGridGeometry();
                  return (
                    state.dotPositionsX.length === 6 &&
                    state.dotPositionsY.length === 6 &&
                    state.dotPositionsX[0] === 4 &&
                    state.dotPositionsX[1] === 12 &&
                    state.dotPositionsX[2] === 20 &&
                    state.dotPositionsY[0] === 4 &&
                    state.dotPositionsY[3] === 12
                  );
                }
              );
            }
          },
          {
            name: "createCanvasContext returns null when canvas is unavailable",
            test() {
              if (typeof createCanvasContext !== "function") {
                return false;
              }

              return (
                createCanvasContext(null) === null &&
                createCanvasContext({
                  getContext() {
                    throw new Error("context unavailable");
                  }
                }) === null
              );
            }
          },
          {
            name: "createCanvasContext does not request a desynchronized context",
            test() {
              const calls = [];
              const fakeContext = {};
              const result = createCanvasContext({
                getContext(...args) {
                  calls.push(args);
                  return fakeContext;
                }
              });

              return (
                result === fakeContext &&
                calls.length === 1 &&
                calls[0][0] === "2d" &&
                calls[0][1]?.alpha === false &&
                calls[0][1]?.desynchronized !== true
              );
            }
          },
          {
            name: "css fallback keeps a fixed grid behind the canvas",
            test() {
              const fallback = getComputedStyle(document.body, "::before");
              return fallback.backgroundImage.includes("radial-gradient") && fallback.backgroundSize === "8px 8px";
            }
          },
          {
            name: "createSeededRandom returns repeatable sequences",
            test() {
              if (typeof createSeededRandom !== "function") {
                return false;
              }

              const firstRandom = createSeededRandom(12345);
              const secondRandom = createSeededRandom(12345);
              const firstSequence = [firstRandom(), firstRandom(), firstRandom()];
              const secondSequence = [secondRandom(), secondRandom(), secondRandom()];
              return firstSequence.every((value, index) => value === secondSequence[index] && value >= 0 && value < 1);
            }
          },
          {
            name: "createStableFlowFieldConfig returns repeatable config",
            test() {
              if (typeof createStableFlowFieldConfig !== "function") {
                return false;
              }

              return JSON.stringify(createStableFlowFieldConfig()) === JSON.stringify(createStableFlowFieldConfig());
            }
          },
          {
            name: "forced canvas resize keeps stable flow config",
            test() {
              resizeCanvas({ force: true });
              const firstConfig = JSON.stringify(state.flowFieldConfig);
              resizeCanvas({ force: true });
              const secondConfig = JSON.stringify(state.flowFieldConfig);
              return firstConfig === secondConfig;
            }
          },
          {
            name: "quality profiles share the visual grid size",
            test() {
              if (typeof VISUAL_GRID_SIZE !== "number") {
                return false;
              }

              return Object.values(CANVAS_QUALITY_PROFILES).every((profile) => profile.gridSize === VISUAL_GRID_SIZE);
            }
          },
          {
            name: "resolveCanvasDpr buckets fractional dpr below cap",
            test() {
              if (typeof resolveCanvasDpr !== "function") {
                return false;
              }

              return (
                resolveCanvasDpr(1.25, 1.5) === 1 &&
                resolveCanvasDpr(1.8, 1.5) === 1 &&
                resolveCanvasDpr(2, 1.5) === 1 &&
                resolveCanvasDpr(2, 2) === 2 &&
                resolveCanvasDpr(3, 2) === 2
              );
            }
          },
          {
            name: "selectQualityProfile uses low quality for save data",
            test() {
              if (typeof selectQualityProfile !== "function") {
                return false;
              }

              const normal = selectQualityProfile({ connection: { saveData: false } });
              const saveData = selectQualityProfile({ connection: { saveData: true } });
              return normal.name === "high" && saveData.name === "low";
            }
          },
          {
            name: "shouldRenderFrame skips frames inside quality interval",
            test() {
              if (typeof shouldRenderFrame !== "function") {
                return false;
              }

              return withTemporaryState(
                {
                  frameInterval: 100,
                  lastFrame: 1000
                },
                () => !shouldRenderFrame(1050) && shouldRenderFrame(1100)
              );
            }
          },
          {
            name: "scheduleCanvasResize coalesces resize requests",
            test() {
              if (typeof scheduleCanvasResize !== "function") {
                return false;
              }

              const previousRequestAnimationFrame = window.requestAnimationFrame;
              let scheduled = 0;
              window.requestAnimationFrame = () => {
                scheduled += 1;
                return scheduled;
              };

              try {
                return withTemporaryState(
                  {
                    resizeRafId: 0
                  },
                  () => {
                    const first = scheduleCanvasResize();
                    const second = scheduleCanvasResize();
                    return first === true && second === false && scheduled === 1;
                  }
                );
              } finally {
                window.requestAnimationFrame = previousRequestAnimationFrame;
              }
            }
          },
          {
            name: "canvas helpers no-op without a context",
            test() {
              return withTemporaryState(
                {
                  ctx: null
                },
                () => drawStaticBackdrop() === false && resizeCanvas() === false
              );
            }
          },
          {
            name: "syncPalette updates numeric rgb cache",
            test() {
              initializeTheme("light");
              const lightFg = state.paletteRgb.fg.join(",");
              initializeTheme("dark");
              const darkFg = state.paletteRgb.fg.join(",");
              return (
                lightFg !== darkFg &&
                state.paletteRgb.fg.every((value) => Number.isFinite(value)) &&
                state.paletteRgb.bg.every((value) => Number.isFinite(value))
              );
            }
          },
          {
            name: "canvas colors use legacy comma-separated syntax",
            test() {
              if (typeof formatCanvasRgb !== "function" || typeof formatCanvasRgba !== "function") {
                return false;
              }

              const rgb = formatCanvasRgb([244, 244, 241]);
              const rgba = formatCanvasRgba([244, 244, 241], 0.1);
              return (
                rgb === "rgb(244, 244, 241)" &&
                rgba === "rgba(244, 244, 241, 0.1)" &&
                !rgb.includes("244 244 241") &&
                !rgba.includes("/")
              );
            }
          },
          {
            name: "canvas rgba alpha is clamped",
            test() {
              return (
                formatCanvasRgba([244, 244, 241], -0.5) === "rgba(244, 244, 241, 0)" &&
                formatCanvasRgba([244, 244, 241], 1.5) === "rgba(244, 244, 241, 1)"
              );
            }
          }
        ];

        const failed = cases.filter((testCase) => !testCase.test());
        const banner = document.createElement("div");
        banner.className = "test-banner";
        banner.textContent = failed.length === 0 ? "Tests passed" : failed.length + " tests failed";
        document.body.appendChild(banner);

        if (failed.length > 0) {
          throw new Error("Test failures: " + failed.map((testCase) => testCase.name).join(", "));
        }
      }

      function bootstrap() {
        renderProfile();
        initializeTheme();
        applyQualityProfile(selectQualityProfile(navigator));
        resizeCanvas();
        state.initialized = true;
        startAnimation();

        themeToggle.addEventListener("click", toggleTheme);
        document.addEventListener("pointerdown", handleDotInteraction, { passive: true });
        window.addEventListener("resize", scheduleCanvasResize);
        document.addEventListener("visibilitychange", handleVisibilityChange);
        systemThemeQuery.addEventListener("change", () => {
          if (state.themePreference === "system") {
            applyTheme("system");
          }
        });

        if (window.location.hash === "#test") {
          runTests();
        }
      }

      bootstrap();
    </script>
  </body>
</html>
