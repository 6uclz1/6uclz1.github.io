<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portrait</title>
    <script>
      (() => {
        const storedTheme = localStorage.getItem("theme");
        const preference = storedTheme === "light" || storedTheme === "dark" ? storedTheme : "dark";
        document.documentElement.dataset.theme = preference;
      })();
    </script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f4f1;
        --fg: #0d0d0f;
        --dot: #0d0d0f;
        --panel: #fffefa;
        --line: #b8b8b0;
        --muted: #36363a;
        --shadow: 0 18px 48px #d6d6cf;
      }

      :root[data-theme="dark"] {
        color-scheme: dark;
        --bg: #09090b;
        --fg: #f4f4f1;
        --dot: #f4f4f1;
        --panel: #141417;
        --line: #5f5f66;
        --muted: #deded8;
        --shadow: 0 18px 48px #000000;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        position: relative;
        overflow-x: hidden;
        background: var(--bg);
        color: var(--fg);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 16px;
        font-weight: 300;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background-image: radial-gradient(
          circle,
          var(--dot) 0,
          var(--dot) 2px,
          transparent 2px
        );
        background-position: 6px 6px;
        background-size: 12px 12px;
      }

      .noise-field {
        position: fixed;
        inset: 0;
        z-index: 0;
        width: 100%;
        height: 100%;
        display: block;
        pointer-events: none;
      }

      .page-header {
        position: fixed;
        top: 1.5rem;
        left: 1.5rem;
        z-index: 3;
        max-width: calc(100vw - 9rem);
      }

      .name,
      .theme-toggle,
      .footer-note,
      .link-chip {
        border: 1px solid var(--line);
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .name {
        display: block;
        margin: 0;
        padding: 0.85rem 1rem;
        border-radius: 999px;
        color: var(--fg);
        font-size: clamp(1rem, 1.35vw, 1.16rem);
        line-height: 1.15;
        letter-spacing: 0.08em;
        font-weight: 400;
        overflow-wrap: anywhere;
      }

      .theme-toggle {
        position: fixed;
        top: 1.5rem;
        right: 1.5rem;
        z-index: 3;
        min-height: 2.75rem;
        padding: 0.8rem 1rem;
        border-radius: 999px;
        color: var(--fg);
        font: inherit;
        font-size: 0.78rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
      }

      .theme-toggle:hover,
      .theme-toggle:focus-visible,
      .link-chip:hover,
      .link-chip:focus-visible {
        transform: translateY(-2px);
        border-color: var(--fg);
        outline: none;
      }

      .shell {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: clamp(1.5rem, 4vw, 3rem);
      }

      .portrait {
        width: min(100%, 36rem);
        padding: clamp(1.2rem, 4vw, 3rem);
      }

      .links {
        display: grid;
        gap: 0.75rem;
        width: min(100%, 48rem);
        margin: 0 auto;
      }

      .link-chip {
        display: grid;
        grid-template-columns: 1rem minmax(0, 1fr) 1rem;
        align-items: center;
        gap: 0.5rem;
        min-height: 2.9rem;
        width: min(100%, 30rem);
        margin: 0 auto;
        padding: 0.8rem 1rem;
        border-radius: 999px;
        color: var(--fg);
        text-decoration: none;
        transition: transform 180ms ease, border-color 180ms ease;
      }

      .link-marker {
        display: block;
        width: 1rem;
        height: 1rem;
        border: 2px solid var(--fg);
        background: var(--dot);
      }

      .link-label {
        justify-self: center;
        color: var(--muted);
        text-align: center;
        line-height: 1.1;
        letter-spacing: 0.12em;
        font-size: 0.9rem;
        font-weight: 400;
      }

      .link-chip::after {
        content: "";
        width: 1rem;
        height: 1rem;
      }

      .footer-note {
        position: fixed;
        right: 1.5rem;
        bottom: 1.4rem;
        z-index: 2;
        min-height: 2.75rem;
        padding: 0.8rem 1rem;
        border-radius: 14px;
        color: var(--muted);
        font-size: 0.76rem;
        letter-spacing: 0.12em;
      }

      .test-banner {
        position: fixed;
        left: 50%;
        top: 1.5rem;
        z-index: 4;
        transform: translateX(-50%);
        padding: 0.6rem 0.9rem;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel);
        color: var(--fg);
        font-size: 0.76rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      @media (max-width: 720px) {
        .page-header {
          top: 1rem;
          left: 1rem;
          right: 6.75rem;
          max-width: none;
        }

        .theme-toggle {
          top: 1rem;
          right: 1rem;
          padding-inline: 0.85rem;
        }

        .footer-note {
          right: 1rem;
          bottom: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <canvas class="noise-field" aria-hidden="true"></canvas>
    <header class="page-header">
      <h1 class="name" id="profile-name"></h1>
    </header>
    <button
      class="theme-toggle"
      id="theme-toggle"
      type="button"
      aria-label="Toggle theme"
      aria-pressed="true"
    >
      Light
    </button>

    <main class="shell">
      <section class="portrait" aria-label="Profile links">
        <div class="links" id="profile-links"></div>
      </section>
    </main>

    <footer class="footer-note">CopyRight &copy;6uclz1</footer>

    <script>
      const profile = {
        name: "6uclz1's Profile Site",
        links: [
          { service: "github", label: "GitHub", url: "https://github.com/6uclz1/" },
          { service: "x", label: "X (Formally Twitter)", url: "https://x.com/6uclz1/" },
          { service: "hatena-blog", label: "Hatena Blog", url: "http://6uclz1.hatenablog.com/" },
          { service: "note", label: "note", url: "https://note.com/6uclz1/" },
          { service: "sizu-me", label: "Sizu.me", url: "https://sizu.me/6uclz1/" },
          { service: "zenn", label: "Zenn", url: "https://zenn.dev/6uclz1/" },
          { service: "qiita", label: "Qiita", url: "https://qiita.com/6uclz1/" },
          { service: "soundcloud", label: "SoundCloud", url: "https://soundcloud.com/6uclz1/" }
        ]
      };

      const THEME_KEY = "theme";
      const GRID_SIZE = 8;
      const DOT_SIZE = 2;
      const FRAME_INTERVAL = 42;
      const FIELD_FADE = 0.96;
      const THEME_COLORS = {
        light: {
          bg: "#f4f4f1",
          fallbackDot: "#0d0d0f",
          palette: ["#f4f4f1", "#dadad4", "#c1c1bb", "#999994", "#56565a", "#0d0d0f"]
        },
        dark: {
          bg: "#09090b",
          fallbackDot: "#f4f4f1",
          palette: ["#09090b", "#151519", "#24242a", "#595960", "#aaa9a2", "#f4f4f1"]
        }
      };

      const FLOW_NODES = [
        { x: 25, y: 30, radius: 260, strength: 32, speedX: 19, speedY: 23, phase: 0 },
        { x: 72, y: 28, radius: 320, strength: -38, speedX: 17, speedY: 29, phase: 2 },
        { x: 42, y: 74, radius: 300, strength: 36, speedX: 31, speedY: 13, phase: 4 },
        { x: 82, y: 72, radius: 220, strength: -28, speedX: 11, speedY: 37, phase: 6 }
      ];

      const canvas = document.querySelector(".noise-field");
      const context = createCanvasContext(canvas);
      const themeToggle = document.getElementById("theme-toggle");
      const state = {
        theme: document.documentElement.dataset.theme === "light" ? "light" : "dark",
        width: 0,
        height: 0,
        dpr: 1,
        fieldColumns: 0,
        fieldRows: 0,
        densityField: new Float32Array(0),
        nextDensityField: new Float32Array(0),
        dotPositionsX: new Uint16Array(0),
        dotPositionsY: new Uint16Array(0),
        lastFrame: 0,
        frame: 0,
        rafId: 0,
        running: false
      };

      function createCanvasContext(canvasElement) {
        if (!canvasElement || typeof canvasElement.getContext !== "function") {
          return null;
        }

        try {
          return canvasElement.getContext("2d");
        } catch (error) {
          return null;
        }
      }

      function buildLinkMarkup(links) {
        return links
          .filter((link) => link.url)
          .map((link) => {
            return [
              `<a class="link-chip" href="${link.url}" target="_blank" rel="noopener noreferrer">`,
              '<span class="link-marker" aria-hidden="true"></span>',
              `<span class="link-label">${link.label}</span>`,
              "</a>"
            ].join("");
          })
          .join("");
      }

      function renderProfile() {
        document.getElementById("profile-name").textContent = profile.name;
        document.getElementById("profile-links").innerHTML = buildLinkMarkup(profile.links);
      }

      function applyTheme(theme) {
        const nextTheme = theme === "light" ? "light" : "dark";
        const colors = THEME_COLORS[nextTheme];
        state.theme = nextTheme;
        document.documentElement.dataset.theme = nextTheme;
        document.documentElement.style.setProperty("--dot", colors.fallbackDot);
        themeToggle.textContent = nextTheme === "dark" ? "Light" : "Dark";
        themeToggle.setAttribute("aria-pressed", String(nextTheme === "dark"));
        drawBackground(state.frame * FRAME_INTERVAL);
      }

      function toggleTheme() {
        const nextTheme = state.theme === "dark" ? "light" : "dark";
        localStorage.setItem(THEME_KEY, nextTheme);
        applyTheme(nextTheme);
      }

      function resizeCanvas() {
        if (!canvas || !context) {
          return false;
        }

        state.width = window.innerWidth;
        state.height = window.innerHeight;
        state.dpr = window.devicePixelRatio >= 2 ? 2 : 1;
        canvas.width = state.width * state.dpr;
        canvas.height = state.height * state.dpr;
        canvas.style.width = state.width + "px";
        canvas.style.height = state.height + "px";
        context.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
        context.imageSmoothingEnabled = false;
        state.fieldColumns = Math.ceil(state.width / GRID_SIZE) + 1;
        state.fieldRows = Math.ceil(state.height / GRID_SIZE) + 1;
        initializeGrid();
        seedDensityField();
        drawBackground(state.frame * FRAME_INTERVAL);
        return true;
      }

      function fieldIndex(x, y) {
        return y * state.fieldColumns + x;
      }

      function initializeGrid() {
        const size = state.fieldColumns * state.fieldRows;
        state.dotPositionsX = new Uint16Array(size);
        state.dotPositionsY = new Uint16Array(size);

        for (let y = 0; y < state.fieldRows; y += 1) {
          for (let x = 0; x < state.fieldColumns; x += 1) {
            const index = fieldIndex(x, y);
            state.dotPositionsX[index] = x * GRID_SIZE + Math.floor(GRID_SIZE / 2);
            state.dotPositionsY[index] = y * GRID_SIZE + Math.floor(GRID_SIZE / 2);
          }
        }
      }

      function seedDensityField() {
        const size = state.fieldColumns * state.fieldRows;
        state.densityField = new Float32Array(size);
        state.nextDensityField = new Float32Array(size);

        for (let y = 0; y < state.fieldRows; y += 1) {
          for (let x = 0; x < state.fieldColumns; x += 1) {
            state.densityField[fieldIndex(x, y)] = baseDensityAt(x, y, 0);
          }
        }
      }

      function baseDensityAt(x, y, time) {
        const slowTime = Math.floor(time / 90);
        const a = Math.sin((x * 7 + y * 3 + slowTime) / 17);
        const b = Math.cos((x * 5 - y * 9 + slowTime * 2) / 23);
        const c = Math.sin((x + y + slowTime * 3) / 19);
        return a + b + c;
      }

      function nodePosition(node, time) {
        const t = time / 1000;
        const x =
          (state.fieldColumns * node.x) / 100 +
          Math.sin(t * node.speedX / 10 + node.phase) * Math.floor(state.fieldColumns / 8);
        const y =
          (state.fieldRows * node.y) / 100 +
          Math.cos(t * node.speedY / 10 + node.phase) * Math.floor(state.fieldRows / 8);
        return { x, y };
      }

      function flowAt(x, y, time) {
        let vx = Math.sin((y + time / 180) / 9) * 0.7;
        let vy = Math.cos((x - time / 210) / 9) * 0.7;
        let density = baseDensityAt(x, y, time);

        for (let index = 0; index < FLOW_NODES.length; index += 1) {
          const node = FLOW_NODES[index];
          const point = nodePosition(node, time);
          const dx = x - point.x;
          const dy = y - point.y;
          const distanceSquared = dx * dx + dy * dy + 1;
          const radius = Math.max(8, Math.floor(node.radius / GRID_SIZE));
          const radiusSquared = radius * radius;

          if (distanceSquared > radiusSquared) {
            continue;
          }

          const influence = Math.floor((radiusSquared - distanceSquared) / radiusSquared * 100) / 100;
          const swirl = node.strength * influence / Math.sqrt(distanceSquared);
          vx += -dy * swirl / 80;
          vy += dx * swirl / 80;
          density += influence * (node.strength > 0 ? 3 : 2);
        }

        return { vx, vy, density };
      }

      function sampleDensity(x, y) {
        const sampleX = Math.max(0, Math.min(state.fieldColumns - 1, Math.round(x)));
        const sampleY = Math.max(0, Math.min(state.fieldRows - 1, Math.round(y)));
        return state.densityField[fieldIndex(sampleX, sampleY)];
      }

      function stepDensityField(time) {
        for (let y = 0; y < state.fieldRows; y += 1) {
          for (let x = 0; x < state.fieldColumns; x += 1) {
            const index = fieldIndex(x, y);
            const flow = flowAt(x, y, time);
            const advected = sampleDensity(x - flow.vx, y - flow.vy);
            const injected = flow.density > 2 ? 0.28 : 0;
            const nextValue = advected * FIELD_FADE + baseDensityAt(x, y, time) * 0.05 + injected;
            state.nextDensityField[index] = Math.max(-3, Math.min(6, nextValue));
          }
        }

        const previous = state.densityField;
        state.densityField = state.nextDensityField;
        state.nextDensityField = previous;
      }

      function paletteIndex(value, maxIndex) {
        if (value < -2) {
          return 1;
        }
        if (value < 0) {
          return 2;
        }
        if (value < 2) {
          return 3;
        }
        if (value < 4) {
          return 4;
        }
        return maxIndex;
      }

      function drawBackground(time) {
        if (!context) {
          return false;
        }

        const colors = THEME_COLORS[state.theme];
        context.fillStyle = colors.bg;
        context.fillRect(0, 0, state.width, state.height);

        const palette = colors.palette;
        const maxIndex = palette.length - 1;
        let drawnDots = 0;
        stepDensityField(time);

        for (let index = 0; index < state.densityField.length; index += 1) {
          const bucket = paletteIndex(state.densityField[index], maxIndex);

          if (bucket === 0) {
            continue;
          }

          const size = bucket >= 4 ? DOT_SIZE + 1 : DOT_SIZE;
          context.fillStyle = palette[bucket];
          context.fillRect(state.dotPositionsX[index], state.dotPositionsY[index], size, size);
          drawnDots += 1;
        }

        return drawnDots;
      }

      function animate(time) {
        if (time - state.lastFrame >= FRAME_INTERVAL) {
          state.frame += 1;
          state.lastFrame = time;
          drawBackground(time);
        }

        state.rafId = window.requestAnimationFrame(animate);
      }

      function startAnimation() {
        if (!context || state.running) {
          return false;
        }

        state.running = true;
        state.rafId = window.requestAnimationFrame(animate);
        return true;
      }

      function runTests() {
        const cases = [
          {
            name: "profile renders links",
            test() {
              return document.querySelectorAll(".link-chip").length === profile.links.length;
            }
          },
          {
            name: "canvas uses opaque palette colors",
            test() {
              if (!context) {
                return false;
              }

              const data = context.getImageData(0, 0, Math.min(canvas.width, 160), Math.min(canvas.height, 160)).data;
              const colors = new Set();
              for (let index = 0; index < data.length; index += 4) {
                colors.add(`${data[index]},${data[index + 1]},${data[index + 2]},${data[index + 3]}`);
                if (colors.size > 2) {
                  return Array.from(colors).every((color) => color.endsWith(",255"));
                }
              }
              return false;
            }
          },
          {
            name: "css fallback uses a visible dot grid",
            test() {
              const before = getComputedStyle(document.body, "::before");
              return before.backgroundImage.includes("radial-gradient") && before.backgroundSize === "12px 12px";
            }
          },
          {
            name: "flow field returns finite values",
            test() {
              const flow = flowAt(120, 80, 1000);
              return Number.isFinite(flow.vx) && Number.isFinite(flow.vy) && Number.isFinite(flow.density);
            }
          }
        ];

        const failed = cases.filter((testCase) => !testCase.test());
        const banner = document.createElement("div");
        banner.className = "test-banner";
        banner.textContent = failed.length === 0 ? "Tests passed" : failed.length + " tests failed";
        document.body.appendChild(banner);

        if (failed.length > 0) {
          throw new Error("Test failures: " + failed.map((testCase) => testCase.name).join(", "));
        }
      }

      function bootstrap() {
        renderProfile();
        applyTheme(state.theme);
        resizeCanvas();
        startAnimation();
        themeToggle.addEventListener("click", toggleTheme);
        window.addEventListener("resize", resizeCanvas);

        if (window.location.hash === "#test") {
          runTests();
        }
      }

      bootstrap();
    </script>
  </body>
</html>
