<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portrait</title>
    <script>
      (() => {
        const storedTheme = localStorage.getItem("theme");
        const preference = storedTheme === "light" || storedTheme === "dark" ? storedTheme : "dark";
        document.documentElement.dataset.theme = preference;
      })();
    </script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f4f1;
        --fg: #0d0d0f;
        --dot: #0d0d0f;
        --panel: #ffffff;
        --line: #b8b8b0;
        --muted: #303036;
        --shadow: 0 18px 48px #c8c8c0;
      }

      :root[data-theme="dark"] {
        color-scheme: dark;
        --bg: #09090b;
        --fg: #f4f4f1;
        --dot: #f4f4f1;
        --panel: #17171b;
        --line: #5f5f66;
        --muted: #d9d9d2;
        --shadow: 0 18px 48px #000000;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        position: relative;
        overflow-x: hidden;
        background: var(--bg);
        color: var(--fg);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 16px;
        font-weight: 300;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background-image: radial-gradient(
          circle,
          var(--dot) 0,
          var(--dot) 3px,
          transparent 3px
        );
        background-position: 8px 8px;
        background-size: 16px 16px;
      }

      .noise-field {
        position: fixed;
        inset: 0;
        z-index: 0;
        width: 100%;
        height: 100%;
        display: block;
        pointer-events: none;
      }

      .page-header {
        position: fixed;
        top: 1.5rem;
        left: 1.5rem;
        z-index: 3;
        max-width: calc(100vw - 9rem);
      }

      .name,
      .theme-toggle,
      .footer-note,
      .link-chip {
        border: 2px solid var(--line);
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .name {
        display: block;
        margin: 0;
        padding: 0.85rem 1rem;
        border-radius: 999px;
        color: var(--fg);
        font-size: clamp(1rem, 1.35vw, 1.16rem);
        line-height: 1.15;
        letter-spacing: 0.08em;
        font-weight: 400;
        overflow-wrap: anywhere;
      }

      .theme-toggle {
        position: fixed;
        top: 1.5rem;
        right: 1.5rem;
        z-index: 3;
        min-height: 2.75rem;
        padding: 0.8rem 1rem;
        border-radius: 999px;
        color: var(--fg);
        font: inherit;
        font-size: 0.78rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
      }

      .theme-toggle:hover,
      .theme-toggle:focus-visible,
      .link-chip:hover,
      .link-chip:focus-visible {
        transform: translateY(-2px);
        border-color: var(--fg);
        outline: none;
      }

      .shell {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: clamp(1.5rem, 4vw, 3rem);
      }

      .portrait {
        width: min(100%, 36rem);
        padding: clamp(1.2rem, 4vw, 3rem);
      }

      .links {
        display: grid;
        gap: 0.75rem;
        width: min(100%, 48rem);
        margin: 0 auto;
      }

      .link-chip {
        display: grid;
        grid-template-columns: 1rem minmax(0, 1fr) 1rem;
        align-items: center;
        gap: 0.5rem;
        min-height: 2.9rem;
        width: min(100%, 30rem);
        margin: 0 auto;
        padding: 0.8rem 1rem;
        border-radius: 999px;
        color: var(--fg);
        text-decoration: none;
        transition: transform 180ms ease, border-color 180ms ease;
      }

      .link-marker {
        display: block;
        width: 1rem;
        height: 1rem;
        border: 2px solid var(--fg);
        background: var(--dot);
      }

      .link-label {
        justify-self: center;
        color: var(--muted);
        text-align: center;
        line-height: 1.1;
        letter-spacing: 0.12em;
        font-size: 0.9rem;
        font-weight: 400;
      }

      .link-chip::after {
        content: "";
        width: 1rem;
        height: 1rem;
      }

      .footer-note {
        position: fixed;
        right: 1.5rem;
        bottom: 1.4rem;
        z-index: 2;
        min-height: 2.75rem;
        padding: 0.8rem 1rem;
        border-radius: 14px;
        color: var(--muted);
        font-size: 0.76rem;
        letter-spacing: 0.12em;
      }

      .test-banner {
        position: fixed;
        left: 50%;
        top: 1.5rem;
        z-index: 4;
        transform: translateX(-50%);
        padding: 0.6rem 0.9rem;
        border: 2px solid var(--line);
        border-radius: 999px;
        background: var(--panel);
        color: var(--fg);
        font-size: 0.76rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      @media (max-width: 720px) {
        .page-header {
          top: 1rem;
          left: 1rem;
          right: 6.75rem;
          max-width: none;
        }

        .theme-toggle {
          top: 1rem;
          right: 1rem;
          padding-inline: 0.85rem;
        }

        .footer-note {
          right: 1rem;
          bottom: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <canvas class="noise-field" aria-hidden="true"></canvas>
    <header class="page-header">
      <h1 class="name" id="profile-name"></h1>
    </header>
    <button
      class="theme-toggle"
      id="theme-toggle"
      type="button"
      aria-label="Toggle theme"
      aria-pressed="true"
    >
      Light
    </button>

    <main class="shell">
      <section class="portrait" aria-label="Profile links">
        <div class="links" id="profile-links"></div>
      </section>
    </main>

    <footer class="footer-note">CopyRight &copy;6uclz1</footer>

    <script>
      const profile = {
        name: "6uclz1's Profile Site",
        links: [
          { service: "github", label: "GitHub", url: "https://github.com/6uclz1/" },
          { service: "x", label: "X (Formally Twitter)", url: "https://x.com/6uclz1/" },
          { service: "hatena-blog", label: "Hatena Blog", url: "http://6uclz1.hatenablog.com/" },
          { service: "note", label: "note", url: "https://note.com/6uclz1/" },
          { service: "sizu-me", label: "Sizu.me", url: "https://sizu.me/6uclz1/" },
          { service: "zenn", label: "Zenn", url: "https://zenn.dev/6uclz1/" },
          { service: "qiita", label: "Qiita", url: "https://qiita.com/6uclz1/" },
          { service: "soundcloud", label: "SoundCloud", url: "https://soundcloud.com/6uclz1/" }
        ]
      };

      const THEME_KEY = "theme";
      const GRID_SIZE = 16;
      const DOT_SIZE = 5;
      const FRAME_STEP = 8;
      const THEME_COLORS = {
        light: { bg: "#f4f4f1", dot: "#0d0d0f" },
        dark: { bg: "#09090b", dot: "#f4f4f1" }
      };

      const canvas = document.querySelector(".noise-field");
      const context = createCanvasContext(canvas);
      const themeToggle = document.getElementById("theme-toggle");
      const state = {
        theme: document.documentElement.dataset.theme === "light" ? "light" : "dark",
        width: 0,
        height: 0,
        dpr: 1,
        frame: 0,
        rafId: 0,
        running: false
      };

      function createCanvasContext(canvasElement) {
        if (!canvasElement || typeof canvasElement.getContext !== "function") {
          return null;
        }

        try {
          return canvasElement.getContext("2d");
        } catch (error) {
          return null;
        }
      }

      function buildLinkMarkup(links) {
        return links
          .filter((link) => link.url)
          .map((link) => {
            return [
              `<a class="link-chip" href="${link.url}" target="_blank" rel="noopener noreferrer">`,
              '<span class="link-marker" aria-hidden="true"></span>',
              `<span class="link-label">${link.label}</span>`,
              "</a>"
            ].join("");
          })
          .join("");
      }

      function renderProfile() {
        document.getElementById("profile-name").textContent = profile.name;
        document.getElementById("profile-links").innerHTML = buildLinkMarkup(profile.links);
      }

      function applyTheme(theme) {
        state.theme = theme === "light" ? "light" : "dark";
        document.documentElement.dataset.theme = state.theme;
        themeToggle.textContent = state.theme === "dark" ? "Light" : "Dark";
        themeToggle.setAttribute("aria-pressed", String(state.theme === "dark"));
        drawBackground();
      }

      function toggleTheme() {
        const nextTheme = state.theme === "dark" ? "light" : "dark";
        localStorage.setItem(THEME_KEY, nextTheme);
        applyTheme(nextTheme);
      }

      function resizeCanvas() {
        if (!canvas || !context) {
          return false;
        }

        state.width = window.innerWidth;
        state.height = window.innerHeight;
        state.dpr = window.devicePixelRatio >= 2 ? 2 : 1;
        canvas.width = state.width * state.dpr;
        canvas.height = state.height * state.dpr;
        canvas.style.width = state.width + "px";
        canvas.style.height = state.height + "px";
        context.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
        drawBackground();
        return true;
      }

      function drawBackground() {
        if (!context) {
          return false;
        }

        const colors = THEME_COLORS[state.theme];
        const offset = (state.frame % FRAME_STEP) * 2;
        context.fillStyle = colors.bg;
        context.fillRect(0, 0, state.width, state.height);
        context.fillStyle = colors.dot;

        for (let y = -GRID_SIZE; y < state.height + GRID_SIZE; y += GRID_SIZE) {
          for (let x = -GRID_SIZE; x < state.width + GRID_SIZE; x += GRID_SIZE) {
            context.fillRect(x + offset, y + offset, DOT_SIZE, DOT_SIZE);
          }
        }

        return true;
      }

      function animate() {
        state.frame += 1;
        drawBackground();
        state.rafId = window.requestAnimationFrame(animate);
      }

      function startAnimation() {
        if (!context || state.running) {
          return false;
        }

        state.running = true;
        state.rafId = window.requestAnimationFrame(animate);
        return true;
      }

      function runTests() {
        const cases = [
          {
            name: "profile renders links",
            test() {
              return document.querySelectorAll(".link-chip").length === profile.links.length;
            }
          },
          {
            name: "canvas uses opaque diagnostic colors",
            test() {
              if (!context) {
                return false;
              }

              const data = context.getImageData(0, 0, Math.min(canvas.width, 96), Math.min(canvas.height, 96)).data;
              const colors = new Set();
              for (let index = 0; index < data.length; index += 4) {
                colors.add(`${data[index]},${data[index + 1]},${data[index + 2]},${data[index + 3]}`);
                if (colors.size > 1) {
                  return Array.from(colors).every((color) => color.endsWith(",255"));
                }
              }
              return false;
            }
          },
          {
            name: "css fallback uses a visible dot grid",
            test() {
              const before = getComputedStyle(document.body, "::before");
              return before.backgroundImage.includes("radial-gradient") && before.backgroundSize === "16px 16px";
            }
          }
        ];

        const failed = cases.filter((testCase) => !testCase.test());
        const banner = document.createElement("div");
        banner.className = "test-banner";
        banner.textContent = failed.length === 0 ? "Tests passed" : failed.length + " tests failed";
        document.body.appendChild(banner);

        if (failed.length > 0) {
          throw new Error("Test failures: " + failed.map((testCase) => testCase.name).join(", "));
        }
      }

      function bootstrap() {
        renderProfile();
        applyTheme(state.theme);
        resizeCanvas();
        startAnimation();
        themeToggle.addEventListener("click", toggleTheme);
        window.addEventListener("resize", resizeCanvas);

        if (window.location.hash === "#test") {
          runTests();
        }
      }

      bootstrap();
    </script>
  </body>
</html>
