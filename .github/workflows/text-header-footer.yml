name: Make header and footer text only

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.event.head_commit.message == 'Add one-time text header footer patch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch index.html
        run: |
          node <<'NODE'
          const fs = require('fs');
          const workflowPath = '.github/workflows/text-header-footer.yml';
          const path = 'index.html';
          let html = fs.readFileSync(path, 'utf8');

          html = html.replace(
            `      .name {
        display: block;
        margin: 0;
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--muted);
        padding: 0.8rem 1rem;
        border-radius: 999px;
        font-family: inherit;
        font-size: clamp(1rem, 1.35vw, 1.16rem);
        line-height: 1;
        letter-spacing: 0.08em;
        font-weight: 100;
        max-width: 100%;
        overflow-wrap: anywhere;
        backdrop-filter: blur(18px);
        transition:
          transform 200ms ease,
          border-color 200ms ease,
          background-color 200ms ease;
      }`,
            `      .name {
        display: block;
        margin: 0;
        color: var(--muted);
        font-family: inherit;
        font-size: clamp(1rem, 1.35vw, 1.16rem);
        line-height: 1;
        letter-spacing: 0.08em;
        font-weight: 100;
        max-width: 100%;
        overflow-wrap: anywhere;
      }`
          );

          html = html.replace(
            `      .footer-note {
        position: fixed;
        right: 1.5rem;
        bottom: 1.4rem;
        z-index: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.75rem;
        padding: 0.8rem 1rem;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--panel);
        color: var(--muted);
        font-size: 0.76rem;
        letter-spacing: 0.14em;
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
      }`,
            `      .footer-note {
        position: fixed;
        right: 1.5rem;
        bottom: 1.4rem;
        z-index: 1;
        color: var(--muted);
        font-size: 0.76rem;
        line-height: 1;
        letter-spacing: 0.14em;
      }`
          );

          html = html.replace(
            `
        .name {
          padding-inline: 0.85rem;
          line-height: 1.15;
        }
`,
            '\n'
          );

          html = html.replace(
            `        .footer-note {
          right: 1rem;
          bottom: 1rem;
          padding: 0.75rem 0.9rem;
        }`,
            `        .footer-note {
          right: 1rem;
          bottom: 1rem;
        }`
          );

          if (/\.name \{[\s\S]*?(border:|background:|padding:|border-radius:|backdrop-filter:)/.test(html)) {
            throw new Error('Header still has enclosing styles.');
          }
          if (/\.footer-note \{[\s\S]*?(border:|background:|padding:|border-radius:|backdrop-filter:|box-shadow:)/.test(html)) {
            throw new Error('Footer still has enclosing styles.');
          }

          fs.writeFileSync(path, html);
          fs.rmSync(workflowPath);
          NODE
      - name: Commit patched file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/text-header-footer.yml
          git commit -m "Make header and footer text only"
          git push
