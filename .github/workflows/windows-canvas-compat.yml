name: Apply Windows canvas compatibility

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.event.head_commit.message == 'Add one-time Windows canvas compatibility patch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch index.html
        run: |
          node <<'NODE'
          const fs = require('fs');
          const workflowPath = '.github/workflows/windows-canvas-compat.yml';
          const path = 'index.html';
          let html = fs.readFileSync(path, 'utf8');

          if (!html.includes('--fallback-dot: #0d0d0f;')) {
            html = html.replace(
              '        --noise-rgb: 10 10 12;\n',
              '        --noise-rgb: 10 10 12;\n        --fallback-dot: #0d0d0f;\n'
            );
            html = html.replace(
              '        --noise-rgb: 246 246 243;\n',
              '        --noise-rgb: 246 246 243;\n        --fallback-dot: #f4f4f1;\n'
            );
          }

          if (!html.includes('      body::before {')) {
            html = html.replace(
              '          color 240ms ease;\n      }\n\n      .noise-field {',
              '          color 240ms ease;\n      }\n\n      body::before {\n        content: "";\n        position: fixed;\n        inset: 0;\n        z-index: 0;\n        pointer-events: none;\n        background-image: radial-gradient(\n          circle,\n          var(--fallback-dot) 0,\n          var(--fallback-dot) 1px,\n          transparent 1px\n        );\n        background-position: 4px 4px;\n        background-size: 8px 8px;\n      }\n\n      .noise-field {'
            );
          }

          html = html.replace(
            '      .noise-field {\n        position: fixed;\n        inset: 0;\n        width: 100%;\n        height: 100%;\n        z-index: 0;\n        display: block;\n      }',
            '      .noise-field {\n        position: fixed;\n        inset: 0;\n        width: 100%;\n        height: 100%;\n        z-index: 0;\n        display: block;\n        pointer-events: none;\n      }'
          );

          html = html.replace(
            '        try {\n          const acceleratedContext = canvasElement.getContext("2d", {\n            alpha: false,\n            desynchronized: true\n          });\n          if (acceleratedContext) {\n            return acceleratedContext;\n          }\n        } catch (error) {\n          // Some browsers throw for context attributes; fall back to a plain 2d context.\n        }\n\n        try {\n          return canvasElement.getContext("2d");\n        } catch (error) {',
            '        try {\n          const opaqueContext = canvasElement.getContext("2d", {\n            alpha: false\n          });\n          if (opaqueContext) {\n            return opaqueContext;\n          }\n        } catch (error) {\n          // Fall back below for browsers that reject context attributes.\n        }\n\n        try {\n          return canvasElement.getContext("2d");\n        } catch (error) {'
          );

          if (!html.includes('createCanvasContext does not request a desynchronized context')) {
            html = html.replace(
              '          {\n            name: "createSeededRandom returns repeatable sequences",',
              '          {\n            name: "createCanvasContext does not request a desynchronized context",\n            test() {\n              const calls = [];\n              const fakeContext = {};\n              const result = createCanvasContext({\n                getContext(...args) {\n                  calls.push(args);\n                  return fakeContext;\n                }\n              });\n\n              return (\n                result === fakeContext &&\n                calls.length === 1 &&\n                calls[0][0] === "2d" &&\n                calls[0][1]?.alpha === false &&\n                calls[0][1]?.desynchronized !== true\n              );\n            }\n          },\n          {\n            name: "css fallback keeps a fixed grid behind the canvas",\n            test() {\n              const fallback = getComputedStyle(document.body, "::before");\n              return fallback.backgroundImage.includes("radial-gradient") && fallback.backgroundSize === "8px 8px";\n            }\n          },\n          {\n            name: "createSeededRandom returns repeatable sequences",'
            );
          }

          fs.writeFileSync(path, html);
          fs.rmSync(workflowPath);
          NODE
      - name: Commit patched file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/windows-canvas-compat.yml
          git commit -m "Apply Windows canvas compatibility to grid background"
          git push
